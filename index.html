<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Codex 生成并通过 GitHub Actions 发布的 HTML 页面导航。">
  <title>Codex 页面档案馆</title>
  <style>
    :root {
      --ink: #18201d;
      --muted: #68716c;
      --paper: #f2efe6;
      --card: #fbfaf5;
      --line: #c9c5b8;
      --accent: #e04b32;
      --green: #245f4b;
      --shadow: 0 18px 50px rgba(24, 32, 29, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(rgba(24, 32, 29, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 32, 29, 0.035) 1px, transparent 1px),
        var(--paper);
      background-size: 32px 32px;
      font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 82% 6%, rgba(224, 75, 50, 0.13), transparent 28rem);
      content: "";
      pointer-events: none;
    }

    .shell {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 40px 0 70px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 30px;
      align-items: end;
      padding: 58px 0 30px;
      border-bottom: 2px solid var(--ink);
    }

    .kicker {
      margin: 0 0 14px;
      color: var(--accent);
      font-family: "Avenir Next", "PingFang SC", sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 820px;
      margin: 0;
      font-size: clamp(42px, 8vw, 92px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.92;
    }

    .intro {
      max-width: 420px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .counter {
      min-width: 138px;
      padding: 16px 18px;
      border: 1px solid var(--ink);
      background: var(--card);
      box-shadow: 6px 6px 0 var(--ink);
      font-family: "Avenir Next", "PingFang SC", sans-serif;
    }

    .counter strong,
    .counter span {
      display: block;
    }

    .counter strong {
      font-size: 42px;
      line-height: 1;
    }

    .counter span {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0;
    }

    .toolbar p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    #search {
      width: min(320px, 100%);
      border: 0;
      border-bottom: 1px solid var(--ink);
      border-radius: 0;
      outline: none;
      padding: 10px 2px;
      color: var(--ink);
      background: transparent;
      font: 15px "Avenir Next", "PingFang SC", sans-serif;
    }

    #search:focus {
      border-bottom-color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .card {
      position: relative;
      display: grid;
      min-height: 285px;
      padding: 28px;
      overflow: hidden;
      border: 1px solid var(--line);
      color: inherit;
      background: var(--card);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      animation: rise 500ms both;
    }

    .card:nth-child(2) {
      animation-delay: 80ms;
    }

    .card::after {
      position: absolute;
      right: -24px;
      bottom: -54px;
      width: 160px;
      height: 160px;
      border: 28px solid var(--accent);
      border-radius: 50%;
      opacity: 0.08;
      content: "";
      transition: transform 250ms ease;
    }

    .card:hover,
    .card:focus-visible {
      border-color: var(--ink);
      box-shadow: 10px 10px 0 var(--ink);
      outline: none;
      transform: translate(-4px, -4px);
    }

    .card:hover::after {
      transform: scale(1.18);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: start;
    }

    .number {
      color: var(--accent);
      font: 800 13px "Avenir Next", sans-serif;
      letter-spacing: 0.12em;
    }

    .tag {
      border: 1px solid var(--green);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--green);
      font: 700 11px "Avenir Next", "PingFang SC", sans-serif;
    }

    .card h2 {
      max-width: 530px;
      margin: 45px 0 12px;
      font-size: clamp(25px, 3.5vw, 38px);
      line-height: 1.15;
    }

    .card p {
      max-width: 580px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      margin-top: 28px;
      font: 12px "Avenir Next", "PingFang SC", sans-serif;
    }

    .open {
      color: var(--accent);
      font-weight: 800;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 70px 20px;
      border: 1px dashed var(--line);
      color: var(--muted);
      text-align: center;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 42px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font: 12px "Avenir Next", "PingFang SC", sans-serif;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 24px, 1180px);
        padding-top: 12px;
      }

      header {
        grid-template-columns: 1fr;
        padding-top: 35px;
      }

      .counter {
        width: 130px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      #search {
        width: 100%;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 260px;
        padding: 23px;
      }

      footer {
        flex-direction: column;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        scroll-behavior: auto !important;
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <p class="kicker">Codex Published Works / GitHub Pages</p>
        <h1>页面<br>档案馆</h1>
        <p class="intro">这里收录所有经脱敏检查后公开部署的 HTML 页面。新增页面会自动加入索引，并通过 GitHub Actions 持续发布。</p>
      </div>
      <div class="counter" aria-live="polite">
        <strong id="count">--</strong>
        <span>PUBLIC PAGES</span>
      </div>
    </header>

    <div class="toolbar">
      <p id="status">正在读取页面目录...</p>
      <label>
        <span class="sr-only" hidden>搜索页面</span>
        <input id="search" type="search" placeholder="搜索标题、描述或标签" autocomplete="off">
      </label>
    </div>

    <main class="grid" id="page-grid">
      <noscript>
        <a class="card" href="./interview-guide.html">
          <h2>雷速体育产品总监面试准备</h2>
        </a>
        <a class="card" href="./metrics.html">
          <h2>雷速体育指标体系</h2>
        </a>
        <a class="card" href="./sports-data-driven-analysis.html">
          <h2>雷速体育 · 数据驱动·赛事·增长·变现</h2>
        </a>
        <a class="card" href="./uplift-model-interview.html">
          <h2>Uplift Model — 会员优惠券面试对答</h2>
        </a>
        <a class="card" href="./membership-renewal-levers.html">
          <h2>喜马拉雅会员续费 5 大杠杆</h2>
        </a>
        <a class="card" href="./membership-project-library.html">
          <h2>会员专题项目库 · 8 项目</h2>
        </a>
        <a class="card" href="./migu-interview-guide.html">
          <h2>咪咕视讯 · 数据科学家</h2>
        </a>
      </noscript>
    </main>

    <footer>
      <span>PUBLIC ARCHIVE · SMALL-MA</span>
      <span>自动部署于 GitHub Pages</span>
    </footer>
  </div>

  <script>
    const grid = document.querySelector("#page-grid");
    const count = document.querySelector("#count");
    const status = document.querySelector("#status");
    const search = document.querySelector("#search");
    let pages = [];

    function render(items) {
      count.textContent = pages.length;
      status.textContent = items.length === pages.length
        ? `共收录 ${pages.length} 个公开页面`
        : `找到 ${items.length} 个匹配页面`;

      if (!items.length) {
        grid.innerHTML = '<div class="empty">没有找到匹配页面。</div>';
        return;
      }

      grid.innerHTML = items.map((page, index) => `
        <a class="card" href="${page.path}" style="animation-delay:${index * 70}ms">
          <div class="card-top">
            <span class="number">${String(index + 1).padStart(2, "0")} / HTML</span>
            <span class="tag">${page.category}</span>
          </div>
          <div>
            <h2>${page.title}</h2>
            <p>${page.description}</p>
          </div>
          <div class="card-bottom">
            <span>更新于 ${page.updated}</span>
            <span class="open">打开页面 ↗</span>
          </div>
        </a>
      `).join("");
    }

    fetch("./pages.json")
      .then(response => {
        if (!response.ok) throw new Error("目录读取失败");
        return response.json();
      })
      .then(data => {
        pages = data.pages;
        render(pages);
      })
      .catch(() => {
        count.textContent = "3";
        status.textContent = "页面目录暂时无法读取";
      });

    search.addEventListener("input", event => {
      const keyword = event.target.value.trim().toLowerCase();
      const filtered = pages.filter(page =>
        [page.title, page.description, page.category]
          .join(" ")
          .toLowerCase()
          .includes(keyword)
      );
      render(filtered);
    });
  </script>
</body>
</html>
