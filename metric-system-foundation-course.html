<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="《指标体系基础课·十六讲》PDF.js 原版式在线阅读器。">
  <title>指标体系基础课 · 十六讲｜原版阅读器</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f4efe3;
      --muted: #a7afa9;
      --panel: #193a31;
      --panel-deep: #102a24;
      --canvas: #292b2a;
      --line: rgba(255, 255, 255, .14);
      --accent: #dc6938;
      --gold: #d7b36a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: var(--canvas);
      font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
    }
    button, input { font: inherit; }
    button, a {
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      height: 100%;
    }
    .toolbar {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
      align-items: center;
      gap: 18px;
      min-height: 68px;
      padding: 10px 18px;
      background: linear-gradient(110deg, var(--panel-deep), var(--panel));
      border-bottom: 1px solid rgba(255, 255, 255, .12);
      box-shadow: 0 8px 30px rgba(0, 0, 0, .28);
    }
    .identity, .controls, .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .identity { min-width: 0; }
    .actions { justify-content: flex-end; }
    .home {
      flex: 0 0 auto;
      color: var(--gold);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }
    .title {
      min-width: 0;
      padding-left: 14px;
      border-left: 1px solid var(--line);
    }
    .title strong, .title small {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .title strong {
      font-family: "Songti SC", "STSong", serif;
      font-size: 17px;
    }
    .title small {
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .12em;
    }
    .tool {
      display: inline-grid;
      place-items: center;
      min-width: 36px;
      height: 36px;
      padding: 0 11px;
      color: var(--ink);
      background: rgba(255, 255, 255, .08);
      border: 1px solid var(--line);
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      transition: background .18s ease, transform .18s ease;
    }
    .tool:hover {
      background: rgba(255, 255, 255, .16);
      transform: translateY(-1px);
    }
    .tool:disabled {
      opacity: .35;
      cursor: default;
      transform: none;
    }
    .page-field {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .page-field input {
      width: 54px;
      height: 36px;
      color: var(--ink);
      text-align: center;
      background: rgba(0, 0, 0, .16);
      border: 1px solid var(--line);
      border-radius: 5px;
      outline: none;
    }
    .zoom-label {
      min-width: 48px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }
    .viewer {
      position: relative;
      overflow: auto;
      padding: 34px;
      background:
        radial-gradient(circle at 50% -20%, rgba(255, 255, 255, .08), transparent 42%),
        linear-gradient(135deg, rgba(255, 255, 255, .025) 25%, transparent 25%) 0 0 / 18px 18px,
        var(--canvas);
    }
    .stage {
      display: grid;
      place-items: start center;
      min-width: min-content;
      min-height: 100%;
    }
    .paper {
      position: relative;
      line-height: 0;
      background: #fff;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .48);
    }
    canvas { display: block; }
    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #555;
      background: #f9f6ed;
      font-size: 14px;
      line-height: 1.5;
    }
    .loading[hidden] { display: none; }
    .progress {
      width: 180px;
      height: 3px;
      margin-top: 12px;
      overflow: hidden;
      background: #ddd7ca;
    }
    .progress span {
      display: block;
      width: 35%;
      height: 100%;
      background: var(--accent);
      animation: loading 1s ease-in-out infinite alternate;
    }
    @keyframes loading {
      from { transform: translateX(-100%); }
      to { transform: translateX(290%); }
    }
    .search-panel {
      position: absolute;
      z-index: 20;
      top: 58px;
      right: 18px;
      width: min(390px, calc(100vw - 36px));
      padding: 14px;
      background: #f7f2e7;
      color: #1b241f;
      border: 1px solid #c8c0b1;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .3);
    }
    .search-panel[hidden] { display: none; }
    .search-row { display: flex; gap: 8px; }
    .search-row input {
      min-width: 0;
      flex: 1;
      height: 40px;
      padding: 0 12px;
      color: #1b241f;
      background: #fff;
      border: 1px solid #aaa294;
      outline: none;
    }
    .search-row button {
      padding: 0 14px;
      color: #fff;
      background: var(--panel);
      border: 0;
      cursor: pointer;
    }
    .search-status {
      margin: 10px 0 6px;
      color: #696c68;
      font-size: 12px;
    }
    .results {
      display: grid;
      gap: 6px;
      max-height: 55vh;
      overflow: auto;
    }
    .result {
      padding: 10px;
      text-align: left;
      color: #1b241f;
      background: #fff;
      border: 1px solid #ddd5c8;
      cursor: pointer;
    }
    .result strong {
      display: block;
      margin-bottom: 4px;
      color: #b54b24;
    }
    .result span {
      display: -webkit-box;
      overflow: hidden;
      font-size: 12px;
      line-height: 1.55;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .error {
      max-width: 460px;
      padding: 28px;
      color: #651e13;
      background: #fff1e9;
      line-height: 1.7;
      text-align: center;
    }
    @media (max-width: 850px) {
      .toolbar {
        grid-template-columns: 1fr auto;
        gap: 8px;
        min-height: 112px;
      }
      .controls {
        grid-column: 1 / -1;
        grid-row: 2;
        justify-content: center;
      }
      .title small { display: none; }
      .viewer { padding: 18px 8px 28px; }
      .hide-mobile { display: none; }
    }
    @media (max-width: 480px) {
      .toolbar { padding: 9px 10px; }
      .title strong { font-size: 14px; }
      .home { font-size: 0; }
      .home::before { content: "← 首页"; font-size: 13px; }
      .controls { gap: 5px; }
      .tool { min-width: 34px; padding: 0 8px; }
      .page-field input { width: 46px; }
      .search-panel { top: 56px; right: 10px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="identity">
        <a class="home" href="./index.html">← 返回页面档案馆</a>
        <div class="title">
          <strong>指标体系基础课 · 十六讲</strong>
          <small>PDF.JS ORIGINAL LAYOUT READER</small>
        </div>
      </div>

      <div class="controls" aria-label="阅读控制">
        <button class="tool" id="previous" type="button" aria-label="上一页">‹</button>
        <label class="page-field">
          <input id="page-number" type="number" min="1" value="1" aria-label="当前页码">
          <span>/ <b id="page-count">--</b></span>
        </label>
        <button class="tool" id="next" type="button" aria-label="下一页">›</button>
        <button class="tool" id="zoom-out" type="button" aria-label="缩小">−</button>
        <span class="zoom-label" id="zoom-label">适宽</span>
        <button class="tool" id="zoom-in" type="button" aria-label="放大">＋</button>
        <button class="tool hide-mobile" id="fit-width" type="button">适宽</button>
      </div>

      <div class="actions">
        <button class="tool" id="search-toggle" type="button" aria-label="搜索">搜索</button>
        <button class="tool hide-mobile" id="fullscreen" type="button" aria-label="全屏">全屏</button>
        <a class="tool" href="./metric-system-foundation-course.pdf" download aria-label="下载 PDF">下载</a>
      </div>

      <section class="search-panel" id="search-panel" hidden aria-label="全文搜索">
        <div class="search-row">
          <input id="search-input" type="search" placeholder="搜索课程内容">
          <button id="search-button" type="button">查找</button>
        </div>
        <div class="search-status" id="search-status">输入关键词，可定位到对应 PDF 页面。</div>
        <div class="results" id="results"></div>
      </section>
    </header>

    <main class="viewer" id="viewer">
      <div class="stage">
        <div class="paper" id="paper">
          <canvas id="pdf-canvas" aria-label="PDF 页面"></canvas>
          <div class="loading" id="loading">
            <div>正在载入原版课程 PDF<div class="progress"><span></span></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import * as pdfjsLib from "./assets/pdfjs/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc = "./assets/pdfjs/pdf.worker.min.mjs";

    const PDF_URL = "./metric-system-foundation-course.pdf";
    const INDEX_URL = "./metric-system-foundation-course-index.json";
    const canvas = document.querySelector("#pdf-canvas");
    const context = canvas.getContext("2d", { alpha: false });
    const viewer = document.querySelector("#viewer");
    const paper = document.querySelector("#paper");
    const loading = document.querySelector("#loading");
    const pageInput = document.querySelector("#page-number");
    const pageCount = document.querySelector("#page-count");
    const zoomLabel = document.querySelector("#zoom-label");
    const previous = document.querySelector("#previous");
    const next = document.querySelector("#next");
    const searchPanel = document.querySelector("#search-panel");
    const searchInput = document.querySelector("#search-input");
    const searchStatus = document.querySelector("#search-status");
    const results = document.querySelector("#results");

    let pdf = null;
    let pageNumber = Number(new URLSearchParams(location.search).get("page")) || 1;
    let zoom = "fit";
    let currentScale = 1;
    let renderTask = null;
    let renderSequence = 0;
    let searchIndex = null;

    const clampPage = (value) => Math.max(1, Math.min(pdf?.numPages || 1, Number(value) || 1));

    function updateUrl() {
      const url = new URL(location.href);
      url.searchParams.set("page", pageNumber);
      history.replaceState(null, "", url);
    }

    function updateControls() {
      pageInput.value = pageNumber;
      previous.disabled = pageNumber <= 1;
      next.disabled = !pdf || pageNumber >= pdf.numPages;
      zoomLabel.textContent = zoom === "fit" ? "适宽" : `${Math.round(zoom * 100)}%`;
    }

    async function renderPage() {
      if (!pdf) return;
      const sequence = ++renderSequence;
      if (renderTask) {
        try { renderTask.cancel(); } catch {}
      }
      loading.hidden = false;

      try {
        const page = await pdf.getPage(pageNumber);
        if (sequence !== renderSequence) return;

        const baseViewport = page.getViewport({ scale: 1 });
        const availableWidth = Math.max(280, viewer.clientWidth - (innerWidth <= 850 ? 20 : 76));
        const displayScale = zoom === "fit"
          ? Math.min(2.2, availableWidth / baseViewport.width)
          : zoom;
        const viewport = page.getViewport({ scale: displayScale });
        currentScale = displayScale;
        const outputScale = Math.min(devicePixelRatio || 1, 2);

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = `${Math.floor(viewport.width)}px`;
        canvas.style.height = `${Math.floor(viewport.height)}px`;
        paper.style.width = canvas.style.width;
        paper.style.height = canvas.style.height;

        renderTask = page.render({
          canvasContext: context,
          viewport,
          transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0],
        });
        await renderTask.promise;
        if (sequence !== renderSequence) return;
        loading.hidden = true;
        updateControls();
        updateUrl();
        viewer.scrollTo({ top: 0, left: 0 });
      } catch (error) {
        if (error?.name === "RenderingCancelledException") return;
        paper.innerHTML = `<div class="error">页面载入失败。请刷新页面，或使用右上角“下载”打开原始 PDF。<br>${String(error.message || error)}</div>`;
      }
    }

    function goToPage(value) {
      const target = clampPage(value);
      if (target === pageNumber && !loading.hidden) return;
      pageNumber = target;
      renderPage();
    }

    function changeZoom(delta) {
      if (zoom === "fit") zoom = currentScale;
      zoom = Math.max(.5, Math.min(3, zoom + delta));
      renderPage();
    }

    async function runSearch() {
      const query = searchInput.value.trim();
      results.replaceChildren();
      if (!query) {
        searchStatus.textContent = "请输入要查找的关键词。";
        return;
      }
      searchStatus.textContent = "正在搜索…";
      if (!searchIndex) {
        const response = await fetch(INDEX_URL);
        searchIndex = (await response.json()).pages;
      }

      const normalized = query.toLocaleLowerCase();
      const matches = searchIndex.filter(({ text }) => text.toLocaleLowerCase().includes(normalized));
      searchStatus.textContent = matches.length
        ? `找到 ${matches.length} 个相关页面`
        : "没有找到匹配内容";

      matches.slice(0, 80).forEach(({ page, text }) => {
        const position = text.toLocaleLowerCase().indexOf(normalized);
        const start = Math.max(0, position - 34);
        const excerpt = `${start > 0 ? "…" : ""}${text.slice(start, position + query.length + 54)}…`;
        const button = document.createElement("button");
        button.className = "result";
        button.type = "button";
        button.innerHTML = `<strong>第 ${page} 页</strong><span></span>`;
        button.querySelector("span").textContent = excerpt;
        button.addEventListener("click", () => {
          searchPanel.hidden = true;
          goToPage(page);
        });
        results.append(button);
      });
    }

    document.querySelector("#previous").addEventListener("click", () => goToPage(pageNumber - 1));
    document.querySelector("#next").addEventListener("click", () => goToPage(pageNumber + 1));
    document.querySelector("#zoom-out").addEventListener("click", () => changeZoom(-.15));
    document.querySelector("#zoom-in").addEventListener("click", () => changeZoom(.15));
    document.querySelector("#fit-width").addEventListener("click", () => {
      zoom = "fit";
      renderPage();
    });
    pageInput.addEventListener("change", () => goToPage(pageInput.value));
    pageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") goToPage(pageInput.value);
    });
    document.querySelector("#search-toggle").addEventListener("click", () => {
      searchPanel.hidden = !searchPanel.hidden;
      if (!searchPanel.hidden) searchInput.focus();
    });
    document.querySelector("#search-button").addEventListener("click", runSearch);
    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") runSearch();
      if (event.key === "Escape") searchPanel.hidden = true;
    });
    document.querySelector("#fullscreen").addEventListener("click", async () => {
      if (document.fullscreenElement) await document.exitFullscreen();
      else await document.documentElement.requestFullscreen();
    });
    window.addEventListener("keydown", (event) => {
      if (event.target.matches("input")) return;
      if (event.key === "ArrowLeft" || event.key === "PageUp") goToPage(pageNumber - 1);
      if (event.key === "ArrowRight" || event.key === "PageDown") goToPage(pageNumber + 1);
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "f") {
        event.preventDefault();
        searchPanel.hidden = false;
        searchInput.focus();
      }
    });
    let resizeTimer;
    window.addEventListener("resize", () => {
      if (zoom !== "fit") return;
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(renderPage, 160);
    });

    try {
      const task = pdfjsLib.getDocument({ url: PDF_URL });
      task.onProgress = ({ loaded, total }) => {
        if (total) loading.querySelector(".progress span").style.width = `${Math.max(8, loaded / total * 100)}%`;
      };
      pdf = await task.promise;
      pageCount.textContent = pdf.numPages;
      pageInput.max = pdf.numPages;
      pageNumber = clampPage(pageNumber);
      await renderPage();
    } catch (error) {
      paper.innerHTML = `<div class="error">PDF 文件载入失败。请检查网络后刷新，或直接下载原始 PDF。<br>${String(error.message || error)}</div>`;
    }
  </script>
</body>
</html>
